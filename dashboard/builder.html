<!DOCTYPE html>
<html>

<head>

<title>WorkflowOS Builder</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
overflow:hidden;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.save{
background:#22c55e;
box-shadow:0 0 10px #22c55e;
}

.run{
background:#3b82f6;
color:white;
box-shadow:0 0 10px #3b82f6;
}

/* WORKSPACE */

.workspace{
position:relative;
height:90vh;
}

/* NODE STYLE */

.node{

position:absolute;
padding:15px 20px;
border-radius:12px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);

cursor:move;

box-shadow:0 0 10px rgba(0,0,0,0.5);

transition:0.2s;

}

.node:hover{

transform:scale(1.08);
box-shadow:0 0 15px #22c55e;

}

</style>

</head>

<body>


<div class="topbar">

<div>

<button onclick="addNode('send_email')">Email Node</button>

<button onclick="addNode('save_db')">DB Node</button>

</div>

<div>

<button class="save" onclick="saveWorkflow()">Save</button>

<button class="run" onclick="runWorkflow()">Run</button>

</div>

</div>


<div class="workspace" id="workspace"></div>


<script>

let nodes=[]
let nodeCount=0


function addNode(type){

nodeCount++

let node={

id:nodeCount,
type:type,
x:100,
y:100

}

nodes.push(node)

renderNodes()

}


function renderNodes(){

const workspace=document.getElementById("workspace")

workspace.innerHTML=""

nodes.forEach(node=>{

const div=document.createElement("div")

div.className="node"

div.style.left=node.x+"px"

div.style.top=node.y+"px"

div.innerText=node.type

workspace.appendChild(div)

})

}


async function saveWorkflow(){

const workflow={nodes:nodes}

const res=await fetch("http://127.0.0.1:8000/workflows",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

name:"builder workflow",

definition:workflow

})

})

const data=await res.json()

alert("Workflow Saved ID: "+data.id)

}


async function runWorkflow(){

let id=prompt("Enter Workflow ID")

const res=await fetch(

"http://127.0.0.1:8000/webhook/"+id,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({})

}

)

const data=await res.json()

console.log(data)

alert("Workflow executed")

}

</script>

</body>

</html>
